name: Daily Digest

on:
  schedule:
    # GitHub cron uses UTC; 01:00 UTC is 09:00 in Asia/Shanghai.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      config_toml_override:
        description: >-
          Optional full config.toml content for this manual run only. When set,
          the workflow skips cache restore/save and Pages deployment.
        required: false
        type: string
      feedback_json_override:
        description: >-
          Optional feedback.json content to materialize before this run. When set,
          it overrides any cached feedback state for this execution.
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: paper-digest-pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install .

      - name: Restore digest state cache
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '' }}
        id: state-restore
        uses: actions/cache/restore@v5
        with:
          path: .paper-digest-state
          key: paper-digest-state-${{ github.run_id }}
          restore-keys: |
            paper-digest-state-

      - name: Restore archive history cache
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '' }}
        id: archive-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            output
            !output/site
          key: paper-digest-output-${{ github.run_id }}
          restore-keys: |
            paper-digest-output-

      - name: Materialize config
        env:
          PAPER_DIGEST_CONFIG_TOML: ${{ secrets.PAPER_DIGEST_CONFIG_TOML }}
          PAPER_DIGEST_CONFIG_TOML_OVERRIDE: ${{ github.event.inputs.config_toml_override }}
        run: |
          if [ -n "$PAPER_DIGEST_CONFIG_TOML_OVERRIDE" ]; then
            printf '%s\n' "$PAPER_DIGEST_CONFIG_TOML_OVERRIDE" > config.toml
            exit 0
          fi
          if [ -z "$PAPER_DIGEST_CONFIG_TOML" ]; then
            echo "Missing PAPER_DIGEST_CONFIG_TOML repository secret." >&2
            exit 1
          fi
          printf '%s\n' "$PAPER_DIGEST_CONFIG_TOML" > config.toml

      - name: Materialize feedback state
        env:
          PAPER_DIGEST_FEEDBACK_JSON: ${{ secrets.PAPER_DIGEST_FEEDBACK_JSON }}
          PAPER_DIGEST_FEEDBACK_JSON_OVERRIDE: ${{ github.event.inputs.feedback_json_override }}
        run: |
          mkdir -p .paper-digest-state
          if [ -n "$PAPER_DIGEST_FEEDBACK_JSON_OVERRIDE" ]; then
            printf '%s\n' "$PAPER_DIGEST_FEEDBACK_JSON_OVERRIDE" > .paper-digest-state/feedback.json
            exit 0
          fi
          if [ -n "$PAPER_DIGEST_FEEDBACK_JSON" ]; then
            printf '%s\n' "$PAPER_DIGEST_FEEDBACK_JSON" > .paper-digest-state/feedback.json
            exit 0
          fi
          if [ -f .paper-digest-state/feedback.json ]; then
            echo "Using cached feedback state."
            exit 0
          fi
          echo "No feedback state payload provided for this run."

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          PAPER_DIGEST_SMTP_PASSWORD: ${{ secrets.PAPER_DIGEST_SMTP_PASSWORD }}
        run: python -m paper_digest --config config.toml

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: digest-output
          path: output/
          if-no-files-found: ignore

      - name: Configure Pages
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
        uses: actions/configure-pages@v6

      - name: Archive Pages artifact
        if: ${{ success() && hashFiles('output/site/**') != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
        run: |
          tar \
            --dereference --hard-dereference \
            --directory output/site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Pages artifact
        if: ${{ success() && hashFiles('output/site/**') != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Save digest state cache
        if: ${{ always() && hashFiles('.paper-digest-state/**') != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
        uses: actions/cache/save@v5
        with:
          path: .paper-digest-state
          key: paper-digest-state-${{ github.run_id }}

      - name: Save archive history cache
        if: ${{ success() && hashFiles('output/**') != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
        uses: actions/cache/save@v5
        with:
          path: |
            output
            !output/site
          key: paper-digest-output-${{ github.run_id }}

  deploy-pages:
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.config_toml_override == '') }}
    needs: digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
