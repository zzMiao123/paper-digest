name: Support request
description: Ask a usage or configuration question after checking the docs
title: "[Support] "
labels:
  - support
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this form only after checking the linked docs. Security problems
        still belong in `SECURITY.md`.
  - type: checkboxes
    id: docs_checked
    attributes:
      label: What you already checked
      options:
        - label: README.md
          required: true
        - label: config.example.toml
          required: true
        - label: docs/config-recipes.md
          required: true
        - label: docs/compatibility-matrix.md
          required: true
        - label: docs/discussions-policy.md
          required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do, and where are you blocked?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: project_version
    attributes:
      label: Project version or commit
      placeholder: v0.4.1 / main / commit SHA
    validations:
      required: true
  - type: textarea
    id: command_or_workflow
    attributes:
      label: Command or workflow path
      description: What exact command, config path, or GitHub Actions workflow are you using?
    validations:
      required: true
  - type: textarea
    id: minimal_config
    attributes:
      label: Minimal config snippet
      description: Paste the smallest relevant config excerpt with secrets removed.
      render: toml
    validations:
      required: false
  - type: textarea
    id: observed_behavior
    attributes:
      label: Error or confusing behavior
      description: Paste the exact output, or describe the mismatch between what happened and what you expected.
      render: shell
    validations:
      required: false
