version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "maintenance"
    commit-message:
      prefix: "deps"
    groups:
      python-tooling:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "maintenance"
    commit-message:
      prefix: "deps"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10
