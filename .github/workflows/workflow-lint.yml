name: Workflow Lint

on:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/*.yml"
      - "Makefile"
      - "tools/check_workflows.py"
      - "tools/install_actionlint.py"
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "Makefile"
      - "tools/check_workflows.py"
      - "tools/install_actionlint.py"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned actionlint
        run: make workflow-tools

      - name: Lint GitHub workflows
        run: make workflow-check
