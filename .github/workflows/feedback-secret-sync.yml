name: Feedback Secret Sync

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: GitHub Actions secret name to export into an artifact.
        required: false
        default: PAPER_DIGEST_FEEDBACK_JSON
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  export-feedback-secret:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Materialize feedback secret
        env:
          FEEDBACK_SECRET_JSON: ${{ secrets[github.event.inputs.secret_name] }}
        run: |
          if [ -z "$FEEDBACK_SECRET_JSON" ]; then
            echo "Missing GitHub Actions secret: ${{ github.event.inputs.secret_name }}" >&2
            exit 1
          fi
          printf '%s\n' "$FEEDBACK_SECRET_JSON" > feedback.json

      - name: Upload feedback artifact
        uses: actions/upload-artifact@v7
        with:
          name: feedback-secret
          path: feedback.json
          retention-days: 1
          if-no-files-found: error
