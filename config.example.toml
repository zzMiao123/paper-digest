[app]
# Start here:
# 1. For a local smoke test, keep [analysis] disabled and leave [[deliveries]]
#    commented out.
# 2. For GitHub Actions scheduled runs, keep [state].path and [feedback].path
#    under .paper-digest-state/.
# 3. For smaller copy/paste examples, see docs/config-recipes.md.
# 4. For support policy and tested environments, see docs/compatibility-matrix.md.

# Timezone used for display and output folder naming.
timezone = "Asia/Shanghai"
# Papers older than this window will be ignored.
lookback_hours = 24
# Relative paths are resolved from the config file location.
output_dir = "output"
# arXiv recommends spacing requests instead of polling aggressively.
request_delay_seconds = 3
# Per-request network timeout for source fetches.
request_timeout_seconds = 60
# Number of fetch attempts for transient upstream failures and timeouts.
fetch_retry_attempts = 4
# Base backoff in seconds between retry attempts.
fetch_retry_backoff_seconds = 10
# Optional OpenAlex API key env var for higher-rate or production usage.
# openalex_api_key_env = "OPENALEX_API_KEY"

[state]
# Keep track of papers that were already included in previous digests.
enabled = true
# This default path works well with the scheduled GitHub Actions workflow.
path = ".paper-digest-state/state.json"
# Drop old state entries after this many days.
retention_days = 90

[feedback]
# Local per-paper feedback state keyed by canonical_id.
enabled = true
# This file is safe to keep local and out of git.
path = ".paper-digest-state/feedback.json"
# Boost applied when a paper is explicitly starred.
star_boost = 80
# Smaller boost for papers marked as follow-up.
follow_up_boost = 35
# Boost applied when a paper is actively being read.
reading_boost = 18
# Penalty applied to papers already marked as done.
done_penalty = 20
# Penalty applied when a paper is marked ignore but still kept visible.
ignore_penalty = 120
# Hide ignored papers from digest output by default.
hide_ignored = true

[notify]
# Keep notifications focused on feedback-triggered papers only.
feedback_only = false
# Include papers that you starred within the current lookback window.
include_new_starred = true
# Include follow-up papers that resurfaced in today's source scan.
include_follow_up_resurfaced = true
# Include starred papers that newly enter the momentum view.
include_starred_momentum = true
# Maximum number of Focus items to render into notifications.
max_focus_items = 5
# Maximum number of action reminders to render into notifications.
max_action_items = 5
# Restrict action reminders to overdue items only.
action_overdue_only = false
# Optional cap for reminders due within N days. Leave commented to disable.
# action_due_within_days = 7
# Supported action reasons include:
# snooze_resumed, overdue, overdue_1d, overdue_3d, overdue_7d,
# due_soon, next_action_pending, recurring_review, recurring_due

[digest]
# Rendering style for Markdown, email, and Feishu output.
template = "default"
# Number of top-of-digest highlight lines to render.
top_highlights = 3
# Number of per-feed "本组速览" lines to render before the paper list.
feed_key_points = 3

[ranking]
# Default ordering for every feed unless a feed overrides it.
sort_by = "hybrid"
# Weight used when a keyword matches the paper title.
title_match_weight = 40
# Weight used when a keyword only matches the abstract summary.
summary_match_weight = 18
# Bonus for papers with a DOI.
doi_weight = 12
# Bonus for papers with a direct PDF link.
pdf_weight = 8
# Bonus for richer abstracts.
rich_summary_weight = 6
# Bonus for papers with both authors and categories populated.
metadata_weight = 4
# Bonus per additional merged source beyond the first.
multi_source_weight = 10
# Maximum freshness bonus inside the lookback window.
freshness_weight_cap = 24

[analysis]
# Optional LLM-powered digest enhancement. Leave disabled until you have an API key.
enabled = false
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1/responses"
timeout_seconds = 60
# Analyze at most this many newly selected papers per run.
max_papers = 8
max_output_tokens = 600
# Output language for LLM-written fields.
language = "English"
# Use "none" to skip reasoning settings entirely.
reasoning_effort = "minimal"

# To get a Chinese daily brief without any model calls, use:
# [digest]
# template = "zh_daily_brief"
# top_highlights = 3
# feed_key_points = 3
# The rule-based briefing will still extract recurring topic terms and assign
# lightweight tags such as 方法 / 数据 / 应用.

[[feeds]]
# Free-form label used in the generated digest.
name = "LLM"
# Supported sources: arxiv, crossref, pubmed, semantic_scholar, openalex
source = "arxiv"
# Optional per-feed override: relevance, published_at, or hybrid.
# sort_by = "relevance"
# arXiv categories: https://arxiv.org/category_taxonomy
categories = ["cs.AI", "cs.CL", "cs.LG"]
# Keep a paper if any keyword matches its title or abstract.
keywords = ["agent", "reasoning", "alignment", "benchmark", "evaluation"]
# Drop a paper if any excluded keyword matches.
exclude_keywords = ["survey", "tutorial"]
# Number of newest candidates to fetch before local filtering.
max_results = 100
# Number of items to keep in the final digest.
max_items = 15

[[feeds]]
name = "Vision"
source = "arxiv"
categories = ["cs.CV"]
keywords = ["diffusion", "video generation", "multimodal", "segmentation"]
exclude_keywords = []
max_results = 100
max_items = 10

# Example Crossref feed:
# [[feeds]]
# name = "Crossref AI"
