[app]
timezone = "Asia/Shanghai"
lookback_hours = 24
output_dir = "output"
request_delay_seconds = 3
request_timeout_seconds = 60
fetch_retry_attempts = 4
fetch_retry_backoff_seconds = 10

[state]
enabled = true
path = ".paper-digest-state/state.json"
retention_days = 90

[feedback]
enabled = true
path = ".paper-digest-state/feedback.json"

[digest]
template = "zh_daily_brief"
top_highlights = 5
feed_key_points = 5

[ranking]
sort_by = "hybrid"

[analysis]
enabled = false
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1/responses"
timeout_seconds = 60
max_papers = 8
max_output_tokens = 600
language = "Chinese"
reasoning_effort = "minimal"

[[feeds]]
name = "LM"
source = "arxiv"
categories = ["cs.CL", "cs.AI", "cs.LG"]
keywords = [
  "language model",
  "large language model",
  "LLM",
  "reasoning",
  "agent",
  "alignment",
  "instruction tuning",
  "in-context learning",
  "retrieval augmented generation",
  "RAG",
  "multimodal language model",
  "benchmark",
  "evaluation",
]
exclude_keywords = ["survey", "tutorial", "position paper"]
max_results = 100
max_items = 15

[[feeds]]
name = "Agent Runtime Security"
source = "arxiv"
categories = ["cs.AI", "cs.CL", "cs.CR", "cs.SE"]
keywords = [
  "agent runtime",
  "runtime security",
  "agent security",
  "secure agent",
  "AI agent security",
  "LLM agent security",
  "autonomous agent security",
  "agent sandbox",
  "sandboxing",
  "agent isolation",
  "tool-use security",
  "tool calling security",
  "function calling security",
  "prompt injection",
  "indirect prompt injection",
  "jailbreak",
  "privilege escalation",
  "data exfiltration",
  "untrusted tool",
  "malicious tool",
  "agent attack",
  "agent defense",
  "policy enforcement",
  "guardrail",
  "computer-use agent",
  "browser agent security",
  "code agent security",
  "MCP security",
  "model context protocol security",
]
exclude_keywords = ["survey", "tutorial", "position paper"]
max_results = 150
max_items = 10

[[feeds]]
name = "Terminal and SWE Agents"
source = "arxiv"
categories = ["cs.SE", "cs.AI", "cs.CL", "cs.LG"]
keywords = [
  "Terminal-Bench",
  "terminal bench",
  "terminal benchmark",
  "terminal agent",
  "command line agent",
  "shell agent",
  "SWE-bench",
  "SWE bench",
  "software engineering agent",
  "software engineering benchmark",
  "coding agent",
  "code agent",
  "program repair",
  "automated program repair",
  "bug fixing",
  "issue resolution",
  "repository-level",
  "repository level",
  "code editing",
  "code generation benchmark",
  "code repair",
  "test generation",
  "patch generation",
]
exclude_keywords = ["survey", "tutorial", "position paper"]
max_results = 150
max_items = 10

[[deliveries]]
type = "feishu_webhook"
webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/replace-me"
title_prefix = "[Paper Digest]"
skip_if_empty = true
target = "digest"
include_focus = true
focus_target = "digest"
include_actions = true
action_target = "digest"
action_only = false
