[app]
timezone = "America/Chicago"
lookback_hours = 72
output_dir = "output"
request_delay_seconds = 3
request_timeout_seconds = 60
fetch_retry_attempts = 4
fetch_retry_backoff_seconds = 10

[state]
enabled = true
path = ".paper-digest-state/state.json"
retention_days = 90

[feedback]
enabled = true
path = ".paper-digest-state/feedback.json"
star_boost = 80
follow_up_boost = 35
reading_boost = 18
done_penalty = 20
ignore_penalty = 120
hide_ignored = true

[digest]
template = "zh_daily_brief"
top_highlights = 3
feed_key_points = 3

[ranking]
sort_by = "relevance"
title_match_weight = 40
summary_match_weight = 18
doi_weight = 12
pdf_weight = 8
rich_summary_weight = 6
metadata_weight = 4
multi_source_weight = 10
freshness_weight_cap = 24

[analysis]
enabled = false
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1/responses"
timeout_seconds = 60
max_papers = 8
max_output_tokens = 600
language = "Chinese"
reasoning_effort = "minimal"

[[feeds]]
name = "Soft tactile sensors for robotics and wearables"
source = "crossref"
queries = [
  "soft tactile sensor robotics wearable electronic skin",
  "flexible tactile sensor robotic gripper wearable",
  "electronic skin tactile sensing robot wearable",
  "soft pressure sensor robotic tactile skin wearable",
  "tactile sensor array soft robotics wearable"
]
types = ["journal-article"]
keywords = [
  "soft haptic sensor",
  "soft tactile sensor",
  "tactile sensor",
  "tactile sensing",
  "tactile skin",
  "electronic skin",
  "artificial skin",
  "wearable sensor",
  "wearable tactile sensor",
  "flexible tactile sensor",
  "stretchable tactile sensor",
  "flexible pressure sensor",
  "stretchable pressure sensor",
  "soft pressure sensor",
  "sensor array",
  "tactile sensor array",
  "robotic tactile sensor",
  "robotic tactile skin",
]
exclude_keywords = [
  "Scientific Reports",
  "review",
  "survey",
  "tutorial",
  "gas sensor",
  "humidity sensor",
  "temperature sensor",
  "chemical sensor",
  "glucose sensor",
  "sweat sensor",
  "biosensor",
  "immunosensor",
  "DNA sensor",
  "photodetector",
  "solar cell",
  "battery",
  "supercapacitor",
  "catalyst",
  "electrocatalysis",
  "water splitting"
]
max_results = 30
max_items = 10
sort_by = "relevance"

